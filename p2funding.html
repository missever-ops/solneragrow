<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2 Funding</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="p2-body">

  <!-- Same top nav as index.html -->
  <header class="top-nav">
    <div class="logo">
      <img src="logo1.png.png" alt="Solnera Grow">
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>

    <!-- 2 images side-by-side -->

        Add your text here. This section can explain what P2 funding is, who it is for,

        You can add multiple paragraphs. If you want bullet points, tell me and I’ll style them too.
      </p>

      <div class="p2-actions">
