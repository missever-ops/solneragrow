 <main class="page">

        Solnera One is an innovative aeroponic system with adaptive LED technology

    <section class="card">

        <input id="email" type="email" placeholder="Email address" required />

      <p class="small">
         <!--Access the dashboard and manage your subscription at <br>
        <b>http://www.solneragrow.com/</b>-->
      </p>
    </div>
  </div>

<script>
const form = document.getElementById("emailForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;

  message.className = "message";
  message.textContent = "Sending...";

  try {
    const response = await fetch("/subscribe", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const text = await response.text();
    let data;
    try { data = JSON.parse(text); } 
    catch { data = { message: text }; }

    if (!response.ok) {
      message.className = "message is-error";
      message.textContent = data.message || `HTTP ${response.status}`;
      return;
    }

    message.className = "message is-success";
    message.textContent = data.message || "Subscribed!";
    form.reset();

  } catch (err) {
    message.className = "message is-error";
    message.textContent = "Error: " + err.message;
    console.error("FETCH ERROR:", err);
  }
});
</script>
