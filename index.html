<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solnera</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="top-nav">
    <div class="logo">
      <a href="index.html">
        <img src="logo2.png.png" alt="Solnera Grow">
      </a>
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="p2funding.html">P2 Funding</a>
    </nav>
  </header>

  <main class="page">
    <section class="left">
      <section class="hero">
        <h1 class="hero-title">Solnera One</h1>
        <p class="hero-text">
          Solnera One is an innovative aeroponic system with adaptive LED technology
          that optimizes plant growth while reducing energy consumption.
        </p>
      </section>

      <section class="card">
        <p class="kicker">Get updates</p>
        <p class="small">Leave your email for additional information.</p>

        <form name="subscribe" method="POST" data-netlify="true" netlify action="/thank-you.html">
  <input type="hidden" name="form-name" value="subscribe" />
  <input type="email" name="email" placeholder="Email address" required />
  <button type="submit">SUBSCRIBE</button>
</form>

        <div class="footer">
          <span>© Solnera</span>
        </div>
      </section>
    </section>

    <section class="right">
      <!-- Space for image -->
      <!-- <img class="hero-image" src="images/yourphoto.png" alt="Product photo"> -->
    </section>
  </main>

  <!-- Hidden Netlify form for detection -->
  <form name="subscribe" netlify hidden>
    <input type="email" name="email" />
  </form>

</body>
</html>
